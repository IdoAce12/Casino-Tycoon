<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180">
      <stop offset="0%" stop-color="#0B0C10"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4E4BC"/>
      <stop offset="40%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8B7320"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="billShadow">
      <feDropShadow dx="1" dy="2" stdDeviation="1" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="180" height="180" rx="36" fill="url(#bg)"/>
  <rect x="8" y="8" width="164" height="164" rx="30" stroke="url(#gold)" stroke-width="1.5" opacity="0.4"/>
  <!-- Floating dollar bills -->
  <g filter="url(#billShadow)" opacity="0.95">
    <g transform="rotate(-25 35 45)">
      <rect x="18" y="28" width="34" height="18" rx="2" fill="#1B5E20"/>
      <rect x="20" y="30" width="30" height="14" rx="1" fill="#2E7D32"/>
      <text x="35" y="41" text-anchor="middle" fill="#A5D6A7" font-size="8" font-family="system-ui" font-weight="bold">$</text>
    </g>
    <g transform="rotate(18 145 38)">
      <rect x="128" y="22" width="32" height="17" rx="2" fill="#1B5E20"/>
      <rect x="130" y="24" width="28" height="13" rx="1" fill="#388E3C"/>
      <text x="144" y="34" text-anchor="middle" fill="#C8E6C9" font-size="7" font-family="system-ui" font-weight="bold">$</text>
    </g>
    <g transform="rotate(-12 28 130)">
      <rect x="12" y="118" width="30" height="16" rx="2" fill="#1B5E20"/>
      <rect x="14" y="120" width="26" height="12" rx="1" fill="#43A047"/>
      <text x="27" y="129" text-anchor="middle" fill="#E8F5E9" font-size="7" font-family="system-ui" font-weight="bold">$</text>
    </g>
    <g transform="rotate(22 152 128)">
      <rect x="138" y="115" width="28" height="15" rx="2" fill="#1B5E20"/>
      <rect x="140" y="117" width="24" height="11" rx="1" fill="#2E7D32"/>
      <text x="152" y="126" text-anchor="middle" fill="#A5D6A7" font-size="6" font-family="system-ui" font-weight="bold">$</text>
    </g>
  </g>
  <!-- Slot machine body -->
  <g filter="url(#glow)">
    <rect x="38" y="48" width="104" height="88" rx="10" fill="#111" stroke="url(#gold)" stroke-width="2.5"/>
    <rect x="44" y="54" width="92" height="52" rx="6" fill="#0a0a0a" stroke="#333" stroke-width="1"/>
    <!-- Reel windows -->
    <rect x="50" y="60" width="24" height="36" rx="3" fill="#0d1a2d" stroke="url(#neon)" stroke-width="1"/>
    <rect x="78" y="60" width="24" height="36" rx="3" fill="#0d1a2d" stroke="url(#neon)" stroke-width="1"/>
    <rect x="106" y="60" width="24" height="36" rx="3" fill="#0d1a2d" stroke="url(#neon)" stroke-width="1"/>
    <!-- Symbols -->
    <text x="62" y="84" text-anchor="middle" font-size="16">7</text>
    <text x="90" y="84" text-anchor="middle" font-size="16">7</text>
    <text x="118" y="84" text-anchor="middle" font-size="16">7</text>
    <!-- Lever -->
    <rect x="142" y="72" width="8" height="28" rx="3" fill="url(#gold)"/>
    <circle cx="146" cy="68" r="7" fill="url(#gold)"/>
    <!-- Base -->
    <rect x="48" y="112" width="84" height="16" rx="4" fill="url(#gold)" opacity="0.9"/>
    <text x="90" y="123" text-anchor="middle" fill="#0B0C10" font-size="7" font-family="system-ui" font-weight="bold" letter-spacing="1">TYCOON</text>
  </g>
</svg>
